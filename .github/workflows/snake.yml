# Place at: .github/workflows/snake.yml  (in your professorsab/professorsab repo)
# After it runs once, the SVGs live on the `output` branch and the README <picture>
# block (commented at the bottom of profile_readme.md) will render them.

name: generate snake animation

on:
  schedule:
    - cron: "0 3 * * *"   # daily
  workflow_dispatch:       # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
